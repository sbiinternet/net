<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | SBI INTERNET</title>

<link rel="icon" href="logo.jpg">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#08131f;
color:#fff;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("background.jpg") center center/cover no-repeat fixed;
filter:blur(6px);
z-index:-2;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.72);
z-index:-1;
}

header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 50px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.1);
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:65px;
height:65px;
border-radius:50%;
box-shadow:0 0 20px cyan;
}

.logo h2{
color:#00E5FF;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:25px;
font-weight:bold;
}

nav a:hover{
color:#00E5FF;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
padding:50px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:15px;
border:2px solid #00E5FF;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="logo.jpg">
<h2>SBI INTERNET</h2>
</div>

<nav>

<a href="ftp.html">FTP</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>

</nav>

</header>

<img src="gallery6.jpg" alt=""></div>

</h2>

</p>

</footer>

</body>

</html>
